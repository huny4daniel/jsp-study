<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>innerHTML 활용</title>
<script>
	function change() {
		var p = document.getElementById("firstP");
		p.innerHTML= "<img src='../images/dog.jpg' width='100' height='100'>";
	}

	function change1() {
		var p = document.getElementById("firstP");
		p.innerHTML= "<img src='../images/cat.jpg' width='100' height='100'>";
	}
</script>
</head>
<body>
<h3>innerHTML 활용 : 아래 글자에 클릭하면 예쁜 강아지가 보입니다.</h3>
<hr>
<p id="firstP" style="color:blue" onclick="change()" onmouseover="change1()">
	여기에<span style="color:red">클릭하세요</span>
</p>
</body>
</html>

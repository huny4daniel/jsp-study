<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CSS 스타일 동적 변경</title>
<script>
   function change() {
      var span = document.getElementById("mySpan"); 
      span.style.color = "green";
      span.style.fontSize = "30px";
      span.style.display = "block";
      span.style.width = "6em";
      span.style.border = "3px dotted magenta";
      span.style.margin = "20px";
   }

   function change1() {
      var para = document.getElementById("myPara");
      para.style.color = "red";
      para.style.fontSize = "40px";
      para.style.display = "black";
      para.style.width = "6em";
      para.style.border = "3px dotted magenta";
      para.style.margin = "20px";
   }
</script>
</head>
<body>
<h3>CSS 스타일 동적 변경</h3>
<hr>
<p style="color:blue" >
   이것은<span id="mySpan" style="color:red">문장입니다.</span>
</p>
<p id="myPara">테스트를 위한 패러그래프</p>
<input type="button" value="스타일변경" onclick="change()">
<input type="button" value="패러그래프변경" onclick="change1()">
</body>
</html>

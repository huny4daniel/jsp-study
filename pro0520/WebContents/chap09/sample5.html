<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>이벤트 객체 전달받기</title>
	</head>
	<body>
		<p id="p">마우스를 올려 보세요</p>
		<button onclick="f(event)">클릭하세요</button>
		<script>

function f(e) {
	alert(e.type + ":" + e.target.tagName);
}

document.getElementById("p").onmouseover = f;
document.getElementById("p").onmouseout = f;

		</script>
	</body>
</html>

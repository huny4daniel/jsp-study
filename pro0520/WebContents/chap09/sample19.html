<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>select 객체에서 선택한 과일출력</title>
		<script>

function drawImage() {
	var sel = document.getElementById("fruits");
	var img = document.getElementById("fruitimage");
	var selectedFruit = document.getElementById("selectedfruit");
	img.src = sel.options[sel.selectedIndex].value;
	selectedFruit.innerHTML = sel.options[sel.selectedIndex].innerHTML;
}

		</script>
	</head>
	<body onload="drawImage()">
		<h3>select 객체에서 선택한 과일 출력</h3>
		<hr>
		과일을 선택하면 이미지가 출력됩니다.
		<form>
			<select id="fruits" onchange="drawImage()">
				<option value="../images/mango.jpg">망고
				<option value="../images/banana.jpg" selected>바나나
				<option value="../images/apple.jpg">사과
			</select>
			<img id="fruitimage" src="../images/banana.jpg" alt=""><br><br>
			<span id="selectedfruit"></span>가 선택되었습니다.
		</form>
	</body>
</html>

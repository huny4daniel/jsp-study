<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>마우스 이벤트 객체의 프로퍼티</title>
		<style>
			div {
				background : skyblue;
				width : 250px;
			}
		</style>
	</head>
	<body>
		<h3>마우스 이벤트 객체의 프로퍼티와 onmousemove</h3>
		<hr>
		이미지 위에 마우스를 움직일 때 
		onmousemove 리스너가 실행되고,  
		마우스의 위치를 보여줍니다.<p>
		<img src="../images/see.jpg" onmousemove="where(event)" onclick="where1(event)" width="300" height="200"><p>
		<div id="div"></div><br>
		<div id="div1"></div>
		<script>

var div = document.getElementById("div");
var div1 = document.getElementById("div1");
function where(e) {
	var text = "버튼=" + e.button + "<br>";
	text += "(screenX, screenY)=" + e.screenX + "," + e.screenY + "<br>";
	text += "(clientX, clientY)=" + e.clientX + "," + e.clientY + "<br>";
	text += "(offsetX, offsetY)=" + e.offsetX + "," + e.offsetY + "<br>";
	text += "(x, y)=" + e.x + "," + e.y + "\n";
	div.innerHTML = text;
}

function where1(e) {
	var text = "버튼=" + e.button + "<br>";
	text += "(screenX, screenY)=" + e.screenX + "," + e.screenY + "<br>";
	text += "(clientX, clientY)=" + e.clientX + "," + e.clientY + "<br>";
	text += "(offsetX, offsetY)=" + e.offsetX + "," + e.offsetY + "<br>";
	text += "(x, y)=" + e.x + "," + e.y + "\n";
	div1.innerHTML = text;
}

		</script>
	</body>
</html>
